name: Fusion Watch Weekly Update

on:
  schedule:
    - cron: "0 7 1 * *"   # Every Monday, 07:00 UTC

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print only, no commit)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      model:
        description: "Anthropic model override"
        required: false
        default: "claude-opus-4-5"
        type: string

permissions:
  contents: write

jobs:
  update-fusion-watch:
    name: Fetch → Analyze → Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Fusion Watch updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ github.event.inputs.model || 'claude-opus-4-5' }}
          FW_DATA_PATH:      data.json
          MAX_FEED_ITEMS:    "6"
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/update_fusion_watch.py --data data.json --dry-run
          else
            python scripts/update_fusion_watch.py --data data.json
          fi

      - name: Commit and push updated data.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "fusion-watch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: auto-update data.json [$(date -u +%Y-%m-%d)] [skip ci]"
            git push
          fi
