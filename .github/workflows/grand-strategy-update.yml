name: Grand Strategy Monthly Update

on:
  schedule:
    - cron: "0 6 1 * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print only, no commit or email)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      model:
        description: "Anthropic model override"
        required: false
        default: "claude-opus-4-5"
        type: string

permissions:
  contents: write

jobs:
  update-grand-strategy:
    name: Fetch → Analyze → Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Grand Strategy updater
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:      ${{ github.event.inputs.model || 'claude-opus-4-5' }}
          GS_HTML_PATH:         grand-strategy.html
          MAX_FEED_ITEMS:       "8"
          GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          BRIEFING_TO_EMAIL:    ${{ secrets.BRIEFING_TO_EMAIL }}

        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/update_grand_strategy.py --html grand-strategy.html --dry-run
          else
            python scripts/update_grand_strategy.py --html grand-strategy.html
          fi

      - name: Commit and push updated HTML
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "grand-strategy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add grand-strategy.html
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: auto-update grand-strategy.html [${DATE}] [skip ci]"
            git push
            echo "✓ Pushed."
          fi
